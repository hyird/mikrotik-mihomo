mixed-port: 7897
tproxy-port: {tproxy_port}
allow-lan: true
bind-address: 0.0.0.0
mode: rule
log-level: info
unified-delay: true

dns:
  enable: true
  listen: :53
  enhanced-mode: fake-ip
  fake-ip-range: {fake_cidr}
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "*.msftncsi.com"
    - "www.msftconnecttest.com"
    - "+.{suburl_domain}"
  default-nameserver:
    - 223.6.6.6
    - 8.8.8.8
  nameserver:
    - 8.8.8.8
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

proxy-providers:
  node:
    type: http
    url: {suburl}
    interval: 1800
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    exclude-filter: "expired|traffic|official|reset|ban"

proxy-groups:
  - name: "Proxy"
    type: select
    use:
      - node

rules:
  - "DOMAIN-SUFFIX,{suburl_domain},DIRECT"
  - "GEOIP,CN,DIRECT"
  - "MATCH,Proxy"

external-controller: 0.0.0.0:{clash_web_port}
secret: {clash_web_password}
external-ui: "./ui"
external-ui-name: xd
